<!DOCTYPE html>
<html><head><title>Crypto Dashboard</title><script src='https://cdn.tailwindcss.com'></script></head><body class='bg-slate-900 text-white p-8'><h1>Live Signals</h1><div id='list'></div><script>async function f(){const r=await fetch('/api/signals');const d=await r.json();document.getElementById('list').innerHTML=d.map(s=>`<div class='p-4 bg-slate-800 my-2'>${s.symbol} - ${s.bias}</div>`).join('')}setInterval(f,5000);f();</script></body></html>
