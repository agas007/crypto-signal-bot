name: Crypto Signal Bot — Cron Scanner

on:
  schedule:
    - cron: '0 * * * *'   # Setiap jam tepat (UTC). WIB = UTC+7
  workflow_dispatch:       # Bisa trigger manual dari GitHub UI

jobs:
  scan:
    name: Run Scan Cycle
    # Bybit API has no geographic IP restrictions — ubuntu-latest works fine.
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Detect Chrome / Chromium path
        run: |
          CHROME=$(which google-chrome 2>/dev/null || \
                   which chromium-browser 2>/dev/null || \
                   which chromium 2>/dev/null || \
                   ls /Applications/Google\ Chrome.app/Contents/MacOS/Google\ Chrome 2>/dev/null || \
                   echo "")
          if [ -z "$CHROME" ]; then
            echo "⚠️ Chrome not found, Puppeteer will use bundled Chromium."
          else
            echo "✅ Chrome found: $CHROME"
            echo "PUPPETEER_EXECUTABLE_PATH=$CHROME" >> $GITHUB_ENV
          fi

      - name: Run one-shot scanner
        run: node src/run_once.js
        env:
          NODE_ENV: production

          # ── Upstash Redis (State Persistence) ────────────────────────────
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

          # ── Discord (Signal Delivery) ─────────────────────────────────────
          DISCORD_SIGNAL_WEBHOOK_URL: ${{ secrets.DISCORD_SIGNAL_WEBHOOK_URL }}
          DISCORD_STATUS_WEBHOOK_URL: ${{ secrets.DISCORD_STATUS_WEBHOOK_URL }}

          # ── OpenRouter AI ─────────────────────────────────────────────────
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:     ${{ secrets.OPENROUTER_MODEL }}

          # ── Bybit (no geographic restrictions, works on ubuntu-latest) ────────
          # BYBIT_API_KEY / SECRET optional — only needed for balance check.
          # If not set, falls back to ACCOUNT_BALANCE env var ($5 risk basis).
          BYBIT_API_KEY:    ${{ secrets.BYBIT_API_KEY }}
          BYBIT_API_SECRET: ${{ secrets.BYBIT_API_SECRET }}

          # ── Strategy Config ───────────────────────────────────────────────
          ACCOUNT_BALANCE:  ${{ secrets.ACCOUNT_BALANCE }}
          MIN_RR_RATIO:     ${{ vars.MIN_RR_RATIO || '1.5' }}
          MAX_PAIRS:        ${{ vars.MAX_PAIRS    || '30' }}
          SCAN_INTERVAL_MS: 3600000
          LOG_LEVEL:        info
